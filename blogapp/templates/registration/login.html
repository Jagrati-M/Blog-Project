{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

<form method="POST">
  {% csrf_token %}
  
  {{ form.as_p }}

  {% if form.errors %}
    <div class="alert alert-danger">
      Invalid username or password
    </div>
  {% endif %}

  <button class="btn btn-primary">Login</button>
</form>

{% endblock %}
